name: Update COPR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_build:
        description: Trigger a COPR build even when the packaged version is already current
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "15 0 * * *"

permissions:
  contents: write

concurrency:
  group: copr-packages-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          restore-cache: true
          save-cache: true
          prune-cache: true
          cache-python: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            .python-version

      - name: Install Python
        run: uv python install

      - name: Sync Python dependencies
        run: uv sync --locked

      - name: Validate COPR configuration
        env:
          COPR_OWNER: ${{ vars.COPR_OWNER }}
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          set -euo pipefail
          for key in COPR_OWNER COPR_LOGIN COPR_USERNAME COPR_TOKEN; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required GitHub variable/secret: $key" >&2
              exit 1
            fi
          done

      - name: Detect upstream version
        run: |
          set -euo pipefail
          uv run scripts/check_upstream.py \
            --packages-json packages.json \
            --update \
            --github-output "$GITHUB_OUTPUT"
        id: upstream

      - name: Detect pushed package changes
        id: push_changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess

          output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          current = json.loads(pathlib.Path("packages.json").read_text(encoding="utf-8"))
          current_names = [package["name"] for package in current["packages"]]
          current_by_spec = {
              f"{package['subdir']}/{package['spec']}": package["name"]
              for package in current["packages"]
          }
          changed = set()

          if os.environ["EVENT_NAME"] == "push":
              before = os.environ["BEFORE"]
              after = os.environ["AFTER"]
              if before and set(before) == {"0"}:
                  before = f"{after}^"
              diff = subprocess.run(
                  [
                      "git",
                      "diff",
                      "--name-only",
                      before,
                      after,
                      "--",
                      "packages.json",
                      "packages/*/*.spec",
                  ],
                  check=False,
                  stdout=subprocess.PIPE,
                  text=True,
              )
              changed_files = set(diff.stdout.splitlines())
              changed.update(
                  name
                  for path, name in current_by_spec.items()
                  if path in changed_files
              )

              if "packages.json" in changed_files:
                  previous = subprocess.run(
                      ["git", "show", f"{before}:packages.json"],
                      check=False,
                      stdout=subprocess.PIPE,
                      text=True,
                  )
                  if previous.returncode != 0:
                      changed.update(current_names)
                  else:
                      old = json.loads(previous.stdout)
                      old_global = {key: value for key, value in old.items() if key != "packages"}
                      new_global = {
                          key: value for key, value in current.items() if key != "packages"
                      }
                      if old_global != new_global:
                          changed.update(current_names)
                      old_packages = {
                          package["name"]: package for package in old.get("packages", [])
                      }
                      new_packages = {
                          package["name"]: package for package in current["packages"]
                      }
                      for name in set(old_packages) | set(new_packages):
                          if old_packages.get(name) != new_packages.get(name):
                              changed.add(name)

          changed_packages = ",".join(name for name in current_names if name in changed)
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"changed_any={'true' if changed_packages else 'false'}\n")
              handle.write(f"changed_packages={changed_packages}\n")
          PY

      - name: Commit packaged version bump
        if: steps.upstream.outputs.changed_any == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/*.spec
          git commit -m "Update packaged versions: ${{ steps.upstream.outputs.changed_packages }}"
          git push

      - name: Write COPR CLI configuration
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
          COPR_URL: ${{ vars.COPR_URL }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config"
          {
            printf '%s\n' '[copr-cli]'
            printf 'login = %s\n' "${COPR_LOGIN}"
            printf 'username = %s\n' "${COPR_USERNAME}"
            printf 'token = %s\n' "${COPR_TOKEN}"
            printf 'copr_url = %s\n' "${COPR_URL:-https://copr.fedorainfracloud.org}"
          } >"$HOME/.config/copr"
          chmod 0600 "$HOME/.config/copr"

      - name: Sync COPR project and package settings
        env:
          COPR_OWNER: ${{ vars.COPR_OWNER }}
        run: |
          set -euo pipefail
          umbrella_project="$(jq -r '.umbrella_project' packages.json)"
          github_url="${{ github.server_url }}/${{ github.repository }}"
          while IFS= read -r package_json; do
            name="$(jq -r '.name' <<<"$package_json")"
            project="$(jq -r '.project' <<<"$package_json")"
            package_args=(
              --owner "$COPR_OWNER" \
              --project "$project" \
              --description "$(printf 'copr build for %s autogenerated from GitHub [%s](%s)\n\nInstall directly with `%s/%s`, or use `%s/%s` for all related packages\n\n[https://sureclaw.com.au/](https://sureclaw.com.au/)' "$name" "$github_url" "$github_url" "$COPR_OWNER" "$project" "$COPR_OWNER" "$umbrella_project")" \
              --instructions "$(printf '```\nsudo dnf copr enable %s/%s\nsudo dnf install %s\n```' "$COPR_OWNER" "$project" "$name")" \
              --package "$name" \
              --clone-url "${{ github.server_url }}/${{ github.repository }}.git" \
              --commit "${{ github.ref_name }}" \
              --subdir "$(jq -r '.subdir' <<<"$package_json")" \
              --spec "$(jq -r '.spec' <<<"$package_json")"
            )
            timeout="$(jq -r '.timeout // empty' <<<"$package_json")"
            if [[ -n "$timeout" ]]; then
              package_args+=(--timeout "$timeout")
            fi
            max_builds="$(jq -r '.max_builds // empty' <<<"$package_json")"
            if [[ -n "$max_builds" ]]; then
              package_args+=(--max-builds "$max_builds")
            fi
            while IFS= read -r arch; do
              package_args+=(--arch "$arch")
            done < <(jq -r '.chroot_arches[]?' <<<"$package_json")
            while IFS= read -r distro; do
              package_args+=(--exclude-distro "$distro")
            done < <(jq -r '.chroot_exclude_distros[]?' packages.json)
            while IFS= read -r distro; do
              package_args+=(--exclude-distro "$distro")
            done < <(jq -r '.exclude_distros[]?' <<<"$package_json")
            uv run python scripts/ensure_copr.py "${package_args[@]}"
          done < <(jq -c '.packages[]' packages.json)

          umbrella_args=(
            --owner "$COPR_OWNER"
            --project "$umbrella_project"
            --description "$(printf 'copr build for all %s ai cli tools autogenerated from GitHub [%s](%s)\n\nEnable `%s/%s` to install every related package, or enable an individual package copr such as `%s/wacli`\n\n[https://sureclaw.com.au/](https://sureclaw.com.au/)' "$COPR_OWNER" "$github_url" "$github_url" "$COPR_OWNER" "$umbrella_project" "$COPR_OWNER")"
            --instructions "$(printf '```\nsudo dnf copr enable %s/%s\nsudo dnf install <package-name>\n```' "$COPR_OWNER" "$umbrella_project")"
          )
          while IFS= read -r package_project; do
            umbrella_args+=(--runtime-dependency-project "$package_project")
          done < <(jq -r '.packages[].project' packages.json)
          while IFS= read -r arch; do
            umbrella_args+=(--arch "$arch")
          done < <(jq -r '.umbrella_chroot_arches[]?' packages.json)
          while IFS= read -r distro; do
            umbrella_args+=(--exclude-distro "$distro")
          done < <(jq -r '.chroot_exclude_distros[]?' packages.json)
          uv run python scripts/ensure_copr.py "${umbrella_args[@]}"

      - name: Trigger COPR builds
        if: steps.upstream.outputs.changed_any == 'true' || steps.push_changes.outputs.changed_any == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_build)
        env:
          COPR_OWNER: ${{ vars.COPR_OWNER }}
        run: |
          set -euo pipefail
          changed_packages=",${{ steps.upstream.outputs.changed_packages }},${{ steps.push_changes.outputs.changed_packages }},"
          while IFS= read -r package_json; do
            name="$(jq -r '.name' <<<"$package_json")"
            project="$(jq -r '.project' <<<"$package_json")"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_build }}" == "true" ]]; then
              uv run copr-cli build-package "${COPR_OWNER}/${project}" --name "${name}" --background --nowait
              continue
            fi
            if [[ "$changed_packages" == *",${name},"* ]]; then
              uv run copr-cli build-package "${COPR_OWNER}/${project}" --name "${name}" --background --nowait
            fi
          done < <(jq -c '.packages[]' packages.json)
