name: Update COPR

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: Trigger a COPR build even when the packaged version is already current
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "15 0 * * 1"

permissions:
  contents: write

concurrency:
  group: copr-packages-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate COPR configuration
        env:
          COPR_OWNER: ${{ vars.COPR_OWNER }}
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          set -euo pipefail
          for key in COPR_OWNER COPR_LOGIN COPR_USERNAME COPR_TOKEN; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required GitHub variable/secret: $key" >&2
              exit 1
            fi
          done

      - name: Detect upstream version
        run: |
          set -euo pipefail
          changed_packages=()
          while IFS= read -r package_json; do
            name="$(jq -r '.name' <<<"$package_json")"
            subdir="$(jq -r '.subdir' <<<"$package_json")"
            spec="$(jq -r '.spec' <<<"$package_json")"
            upstream_url="$(jq -r '.upstream_url // empty' <<<"$package_json")"
            npm_package="$(jq -r '.npm_package // empty' <<<"$package_json")"
            tag_prefix="$(jq -r '.tag_prefix // "v"' <<<"$package_json")"

            output_file="$(mktemp)"
            check_args=(
              --spec "${subdir}/${spec}"
              --update
              --github-output "${output_file}"
            )
            if [[ -n "$npm_package" ]]; then
              check_args+=(--npm-package "$npm_package")
            else
              check_args+=(--upstream-url "${upstream_url}" --tag-prefix "${tag_prefix}")
            fi
            python3 scripts/check_upstream.py "${check_args[@]}"

            if [[ "$(sed -n 's/^changed=//p' "${output_file}")" == "true" ]]; then
              changed_packages+=("${name}")
            fi
          done < <(jq -c '.packages[]' packages.json)

          if ((${#changed_packages[@]} > 0)); then
            printf 'changed_any=true\n' >>"$GITHUB_OUTPUT"
            printf 'changed_packages=%s\n' "$(IFS=,; echo "${changed_packages[*]}")" >>"$GITHUB_OUTPUT"
          else
            printf 'changed_any=false\n' >>"$GITHUB_OUTPUT"
            printf 'changed_packages=\n' >>"$GITHUB_OUTPUT"
          fi
        id: upstream

      - name: Commit packaged version bump
        if: steps.upstream.outputs.changed_any == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/*.spec
          git commit -m "Update packaged versions: ${{ steps.upstream.outputs.changed_packages }}"
          git push

      - name: Install COPR CLI
        run: python3 -m pip install --user copr-cli==2.4

      - name: Write COPR CLI configuration
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
          COPR_URL: ${{ vars.COPR_URL }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config"
          {
            printf '%s\n' '[copr-cli]'
            printf 'login = %s\n' "${COPR_LOGIN}"
            printf 'username = %s\n' "${COPR_USERNAME}"
            printf 'token = %s\n' "${COPR_TOKEN}"
            printf 'copr_url = %s\n' "${COPR_URL:-https://copr.fedorainfracloud.org}"
          } >"$HOME/.config/copr"
          chmod 0600 "$HOME/.config/copr"
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Sync COPR project and package settings
        env:
          COPR_OWNER: ${{ vars.COPR_OWNER }}
        run: |
          set -euo pipefail
          while IFS= read -r package_json; do
            name="$(jq -r '.name' <<<"$package_json")"
            project="$(jq -r '.project' <<<"$package_json")"
            package_args=(
              --owner "$COPR_OWNER" \
              --project "$project" \
              --description "Canonical COPR build for ${name}." \
              --instructions "$(printf 'dnf copr enable %s/%s\ndnf install %s' "$COPR_OWNER" "$project" "$name")" \
              --package "$name" \
              --clone-url "${{ github.server_url }}/${{ github.repository }}.git" \
              --commit "${{ github.ref_name }}" \
              --subdir "$(jq -r '.subdir' <<<"$package_json")" \
              --spec "$(jq -r '.spec' <<<"$package_json")"
            )
            while IFS= read -r arch; do
              package_args+=(--arch "$arch")
            done < <(jq -r '.chroot_arches[]?' <<<"$package_json")
            python3 scripts/ensure_copr.py "${package_args[@]}"
          done < <(jq -c '.packages[]' packages.json)

          umbrella_project="$(jq -r '.umbrella_project' packages.json)"
          umbrella_args=(
            --owner "$COPR_OWNER"
            --project "$umbrella_project"
            --description "Umbrella COPR for AI-related CLI tools."
            --instructions "$(printf 'dnf copr enable %s/%s\ndnf install <package-name>' "$COPR_OWNER" "$umbrella_project")"
          )
          while IFS= read -r package_project; do
            umbrella_args+=(--runtime-dependency-project "$package_project")
          done < <(jq -r '.packages[].project' packages.json)
          while IFS= read -r arch; do
            umbrella_args+=(--arch "$arch")
          done < <(jq -r '.umbrella_chroot_arches[]?' packages.json)
          python3 scripts/ensure_copr.py "${umbrella_args[@]}"

      - name: Trigger COPR builds
        if: steps.upstream.outputs.changed_any == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_build)
        env:
          COPR_OWNER: ${{ vars.COPR_OWNER }}
        run: |
          set -euo pipefail
          changed_packages=",${{ steps.upstream.outputs.changed_packages }},"
          while IFS= read -r package_json; do
            name="$(jq -r '.name' <<<"$package_json")"
            project="$(jq -r '.project' <<<"$package_json")"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_build }}" == "true" ]]; then
              copr-cli build-package "${COPR_OWNER}/${project}" --name "${name}"
              continue
            fi
            if [[ "$changed_packages" == *",${name},"* ]]; then
              copr-cli build-package "${COPR_OWNER}/${project}" --name "${name}"
            fi
          done < <(jq -c '.packages[]' packages.json)
